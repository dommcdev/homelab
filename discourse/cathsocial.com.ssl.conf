# 1. Catch all insecure HTTP traffic on Port 80 and force it to HTTPS
<VirtualHost 192.168.1.53:80>
    ServerName cathsocial.com

    ProxyRequests Off
    ProxyPreserveHost On

    # Redirect all HTTP requests to HTTPS seamlessly
    Redirect permanent / https://cathsocial.com/
</VirtualHost>


# 2. Handle the secure HTTPS traffic, decrypt it, and pass it to Server B
<VirtualHost 192.168.1.53:443>
    ServerName cathsocial.com

    # SSL Configuration — Server A handles 100% of the encryption
    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/cathsocial.com.cert
    SSLCertificateKeyFile /etc/pki/tls/private/cathsocial.com.key
    SSLCertificateChainFile /etc/pki/tls/certs/cathsocial.com.bundle

    # Proxy Engine Settings
    ProxyRequests Off
    ProxyPreserveHost On

    # CRUCIAL: "Sticky notes" telling Discourse it's secure and running on 443
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Forward the clean, decrypted traffic to Server B on Port 8080
    ProxyPass / http://192.168.1.40:8080/
    ProxyPassReverse / http://192.168.1.40:8080/

    # Optional: Log files dedicated to tracking your forum traffic
    ErrorLog /usr/local/apache/domlogs/cathsocial.com.error.log
    CustomLog /usr/local/apache/domlogs/cathsocial.com.log combined
</VirtualHost>
