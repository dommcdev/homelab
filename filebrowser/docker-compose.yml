services:
  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - homelab
    volumes:
      - ~/files:/srv
      - ~/filebrowser/config:/config
      - ~/filebrowser/database:/database
    environment:
      - FB_TOKEN_EXPIRATION_TIME=500h

networks:
  homelab:
    external: true
