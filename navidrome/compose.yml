services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    networks:
      - homelab
    #    environment:
    # Optional: put your config options customization here. Examples:
    # ND_LOGLEVEL: debug
    volumes:
      - "~/app/navidrome:/data"
      - "~/music:/music:ro"

networks:
  homelab:
    external: true
